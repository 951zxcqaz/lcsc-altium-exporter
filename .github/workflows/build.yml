name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build Npnp.Core
      run: dotnet build src/Npnp.Core/Npnp.Core.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Build CLI
      run: dotnet build src/Npnp.CLI/Npnp.CLI.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Build Transform.App
      run: dotnet build src/Transform.App/Transform.App.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Run tests
      run: dotnet test tests/Npnp.Core.Tests/Npnp.Core.Tests.csproj --configuration ${{ env.CONFIGURATION }} --verbosity normal

    - name: Publish CLI
      run: |
        dotnet publish src/Npnp.CLI/Npnp.CLI.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --output ./publish/npnp-cli `
          -p:PublishSingleFile=true `
          -p:SelfContained=true `
          -p:RuntimeIdentifier=win-x64

    - name: Publish GUI
      run: |
        dotnet publish src/Transform.App/Transform.App.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --output ./publish/transform-app `
          -p:PublishSingleFile=true `
          -p:SelfContained=true `
          -p:RuntimeIdentifier=win-x64

    - name: Copy npnp.exe to output tools folder
      run: |
        if (-not (Test-Path ./publish/transform-app/tools)) { New-Item -ItemType Directory -Path ./publish/transform-app/tools | Out-Null }
        Copy-Item -Path ./src/Transform.App/tools/npnp.exe -Destination ./publish/transform-app/tools/npnp.exe -Force

    - name: Create zip archives
      run: |
        Compress-Archive -Path ./publish/npnp-cli/* -DestinationPath ./npnp-cli-win-x64.zip
        Compress-Archive -Path ./publish/transform-app/* -DestinationPath ./transform-app-win-x64.zip

    - name: List release assets
      run: |
        Get-ChildItem *.zip | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}}

    - name: Upload release assets
      uses: actions/upload-artifact@v4
      with:
        name: release-zips
        path: |
          ./*.zip
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download release assets
      uses: actions/download-artifact@v4
      with:
        name: release-zips

    - name: Display downloaded files
      run: ls -la

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          npnp-cli-win-x64.zip
          transform-app-win-x64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build Npnp.Core
      run: dotnet build src/Npnp.Core/Npnp.Core.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Build CLI
      run: dotnet build src/Npnp.CLI/Npnp.CLI.csproj --configuration ${{ env.CONFIGURATION }}
