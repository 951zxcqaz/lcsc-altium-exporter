name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build Npnp.Core
      run: dotnet build src/Npnp.Core/Npnp.Core.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Build CLI
      run: dotnet build src/Npnp.CLI/Npnp.CLI.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Build Transform.App
      run: dotnet build src/Transform.App/Transform.App.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Run tests
      run: dotnet test tests/Npnp.Core.Tests/Npnp.Core.Tests.csproj --configuration ${{ env.CONFIGURATION }} --verbosity normal

    - name: Publish CLI
      run: |
        dotnet publish src/Npnp.CLI/Npnp.CLI.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --output ./publish/npnp-cli `
          -p:PublishSingleFile=true `
          -p:SelfContained=true `
          -p:RuntimeIdentifier=win-x64

    - name: Publish GUI
      run: |
        dotnet publish src/Transform.App/Transform.App.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --output ./publish/transform-app `
          -p:PublishSingleFile=true `
          -p:SelfContained=true `
          -p:RuntimeIdentifier=win-x64

    - name: Copy npnp.exe placeholder notice
      run: |
        "Please download npnp.exe from https://github.com/linkyourbin/npnp/releases and place it in the tools/ directory" | Out-File -FilePath ./publish/transform-app/tools/README.txt -Encoding utf8

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: transform-build-${{ github.run_number }}
        path: |
          ./publish/**
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: transform-build-${{ github.run_number }}

    - name: Display structure
      run: ls -la

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          npnp-cli/**
          transform-app/**
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build Npnp.Core
      run: dotnet build src/Npnp.Core/Npnp.Core.csproj --configuration ${{ env.CONFIGURATION }}

    - name: Build CLI
      run: dotnet build src/Npnp.CLI/Npnp.CLI.csproj --configuration ${{ env.CONFIGURATION }}
